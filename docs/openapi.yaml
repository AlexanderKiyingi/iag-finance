openapi: 3.0.3
info:
  title: IAG Finance API
  version: 1.0.0
  description: General ledger, AR/AP, payments, and finance reports (gateway prefix /api/v1/finance).
servers:
  - url: http://localhost:8080/api/v1/finance
paths:
  /v1/chart-of-accounts:
    get:
      summary: List chart of accounts
      tags: [Ledger]
    post:
      summary: Create chart account
      tags: [Ledger]
  /v1/ledger/entries:
    get:
      summary: List journal entries
      tags: [Ledger]
    post:
      summary: Create draft journal entry
      tags: [Ledger]
  /v1/ar/items:
    get:
      summary: List AR open items
      tags: [AR]
    post:
      summary: Create AR open item
      tags: [AR]
  /v1/ar/items/{id}/payments:
    get:
      summary: List payments for AR item
      tags: [AR]
    post:
      summary: Apply AR payment (cash receipt)
      tags: [AR]
  /v1/ap/items:
    get:
      summary: List AP open items
      tags: [AP]
    post:
      summary: Create AP open item
      tags: [AP]
  /v1/ap/items/{id}/payments:
    get:
      summary: List payments for AP item
      tags: [AP]
    post:
      summary: Apply AP payment (disbursement)
      tags: [AP]
  /v1/reports/trial-balance:
    get:
      summary: Trial balance
      tags: [Reports]
  /v1/reports/ar-aging:
    get:
      summary: AR aging buckets
      tags: [Reports]
  /v1/reports/ap-aging:
    get:
      summary: AP aging buckets
      tags: [Reports]
  /v1/reports/profit-and-loss:
    get:
      summary: Profit and loss (params from/to, posted-only, base currency)
      tags: [Reports]
  /v1/reports/balance-sheet:
    get:
      summary: Balance sheet (param asOf; includes current-period earnings rollup)
      tags: [Reports]
  /v1/reports/gl-account/{code}:
    get:
      summary: Per-account GL detail with running base balance (params from/to)
      tags: [Reports]
      parameters:
        - name: code
          in: path
          required: true
          schema: { type: string }
  /v1/finance/summary:
    get:
      summary: AR summary for BFF consumers
      tags: [Reports]
  /v1/ledger/year-end/{year}/close:
    post:
      summary: Year-end close (rolls P&L into retained earnings, locks the year)
      tags: [Ledger]
      parameters:
        - name: year
          in: path
          required: true
          schema: { type: integer }
  /v1/fixed-assets:
    get:
      summary: List capitalised fixed assets (cost, accumulated depreciation, NBV)
      tags: [Fixed Assets]
    post:
      summary: Capitalise an asset (posts Dr 1500 / Cr expense unless recordOnly)
      tags: [Fixed Assets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [assetRef, cost, inServiceDate, usefulLifeMonths]
              properties:
                assetRef: { type: string, description: warehouse asset tag }
                description: { type: string }
                category: { type: string }
                cost: { type: string, description: decimal string }
                salvageValue: { type: string }
                inServiceDate: { type: string, format: date }
                usefulLifeMonths: { type: integer }
                currency: { type: string }
                recordOnly: { type: boolean, description: skip the capitalization GL reclass }
                capitalizeFromAccount: { type: string, description: expense account to reclass from (default 5000) }
  /v1/fixed-assets/depreciation/run:
    post:
      summary: Run straight-line depreciation for a period (posts Dr 5300 / Cr 1510)
      tags: [Fixed Assets]
      parameters:
        - name: period
          in: query
          schema: { type: string, description: "YYYY-MM (default current month)" }
  /v1/invoices:
    get:
      summary: List invoices (legacy shape)
      tags: [Invoices]
    post:
      summary: Create invoice
      tags: [Invoices]
  /v1/invoices/funnel:
    get:
      summary: Sales funnel metrics
      tags: [Invoices]
  /v1/invoices/{no}:
    get:
      summary: Get invoice by number
      tags: [Invoices]
    patch:
      summary: Update invoice
      tags: [Invoices]
    delete:
      summary: Delete open invoice
      tags: [Invoices]
  /v1/banking/accounts:
    get:
      summary: List bank accounts
      tags: [Banking]
  /v1/banking/transactions:
    get:
      summary: List bank transactions
      tags: [Banking]
  /v1/integrations/banking/sync:
    post:
      summary: Sync bank feed from HTTP adapter
      tags: [Integrations]
  /v1/integrations/ura-efris:
    get:
      summary: EFRIS integration status
      tags: [Integrations]
  /v1/integrations/ura-efris/submit:
    post:
      summary: Queue EFRIS submission
      tags: [Integrations]
  /v1/integrations/banking:
    get:
      summary: Banking integration status
      tags: [Integrations]
  /v1/integrations/banking/statements:
    post:
      summary: Import bank statement metadata
      tags: [Integrations]

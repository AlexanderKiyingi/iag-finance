name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: iag
          POSTGRES_PASSWORD: iag_dev
          POSTGRES_DB: iag_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U iag -d iag_platform"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Create finance schema
        env:
          PGPASSWORD: iag_dev
        run: psql -h localhost -U iag -d iag_platform -c 'CREATE SCHEMA IF NOT EXISTS finance;'

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build
        run: go build -v ./...
        env:
          DATABASE_URL: postgres://iag:iag_dev@localhost:5432/iag_platform?sslmode=disable&search_path=finance
          ENVIRONMENT: staging
          AUTH_MODE: jwt
          GATEWAY_INTERNAL_SECRET: dev-gateway-secret-min-16-chars

      - name: Test
        run: go test ./...
        env:
          DATABASE_URL: postgres://iag:iag_dev@localhost:5432/iag_platform?sslmode=disable&search_path=finance
          ENVIRONMENT: staging
          AUTH_MODE: jwt
          GATEWAY_INTERNAL_SECRET: dev-gateway-secret-min-16-chars

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        run: docker build -t iag-finance:ci .

      - name: Verify image healthcheck
        run: docker run --rm iag-finance:ci wget -qO- http://127.0.0.1:3006/ready
